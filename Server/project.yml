name: AssistantMCPServer
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.wads.AssistantMCPServer
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: 0.12.1
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.13.0
  yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.1.3
schemes:
  AssistantMCPServer:
    build:
      targets:
        AssistantMCPServer: all
    test:
      config: Debug
      targets:
        - AssistantMCPServerUnitTests
    run:
      config: Debug
    archive:
      config: Release
targets:
  AssistantMCPServer:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: "Resources/whatsapp_web_selectors.yaml"
        buildPhase: resources
      - path: "Resources/whatsapp_native_selectors.yaml"
        buildPhase: resources
      - path: "Resources/GoogleService-Info.plist"
        buildPhase: resources
      - path: "Integrations/lmstudio/Assistant System prompt.md"
        buildPhase: resources
    dependencies:
      - package: swift-sdk
        product: MCP
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseStorage
      - package: yams
        product: Yams
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist

        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DU6489YN3U
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: Sources/AssistantMCPServer.entitlements

        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEAD_CODE_STRIPPING: YES

  AssistantMCPServerUnitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: AssistantMCPServer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
