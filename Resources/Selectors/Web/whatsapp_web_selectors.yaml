schema_version: 1
version: 1

flows:
  login_qr:
    type: boolean
    selector: "canvas"

  downloading:
    type: boolean
    text_includes_any:
      - "mensagens estão sendo baixadas"
      - "messages are being downloaded"

  chat_list:
    type: boolean
    selector: '[data-testid="chat-list"]'

  chat_selected:
    type: boolean
    selector: '[data-testid="conversation-panel-wrapper"]'

web:
  chat_list_root:
    type: element
    selector: '[data-testid="chat-list"]'
    extract:
      chat_items:
        type: elements
        selector: '[data-testid^="list-item-"]'
        extract:
          chat_clickable_to_open_options:
            type: element
            selector: "[data-testid]"
            interactive: true

          chat_clickable_to_open_chat:
            type: element
            selector: '[data-testid="cell-frame-container"]'
            interactive: true

          chat_item_name:
            type: text
            selector: '[data-testid="cell-frame-title"] [title]'
            attribute: "title"

          chat_item_last_message:
            type: text
            selector: '[data-testid="cell-frame-secondary"] [title]'
            attribute: "title"

          chat_item_last_message_time:
            type: text
            selector: '[data-testid="cell-frame-primary-detail"]'

          chat_item_unread_badge:
            type: element
            selector: '[data-testid="icon-unread-count"]'
            extract:
              count:
                type: number
                value_from:
                  - "textContent:int"
                fallback_number: 1
  
  current_chat:
    type: element
    selector: '[data-testid="conversation-panel-wrapper"]'
    extract:
      chat_title:
        type: text
        selector: '[data-testid="conversation-info-header-chat-title"]'

      chat_input_message_box:
        type: element
        selector: '[data-testid="conversation-compose-box-input"]'
        interactive: true

      chat_input_message_text:
        type: text
        selector: '[data-testid="conversation-compose-box-input"]'

      chat_button_send_message:
        type: element
        selector: '[data-testid="compose-btn-send"]'
        interactive: true

      chat_messages:
        type: elements
        selector: '[role="row"]'
        extract:
          is_audio:
            selector: '[aria-label~="voz"]'
            type: boolean

          is_image:
            selector: '[data-testid="image-thumb"]'
            type: boolean

          is_sticker:
            selector: '[data-testid="sticker-container"]'
            type: boolean

          message_id:
            selector: '[data-id]'
            type: text
            attribute: 'data-id'

          message_text:
            type: text
            selector: '[data-testid="selectable-text"]'

          message_datetime_and_author:
            type: text
            selector: '[data-pre-plain-text]'
            attribute: "data-pre-plain-text"

          message_time:
            type: text
            selector: '[data-testid="msg-meta"] span'

