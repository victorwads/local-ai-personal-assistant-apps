name: AssistantMCPServer
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.wads.AssistantMCPServer
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
packages:
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: 0.12.1
schemes:
  AssistantMCPServer:
    build:
      targets:
        AssistantMCPServer: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  AssistantMCPServer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: swift-sdk
        product: MCP
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: 8484C7E493D0945D34C283EE731478158A12930A
        DEVELOPMENT_TEAM: RP7J7JX9L2
        SWIFT_VERSION: 6.0
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
